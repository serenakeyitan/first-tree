# Eval case: Streaming callbacks drop inbound metadata
# Based on: https://github.com/HKUDS/nanobot/pull/2633
# Bug: on_stream and on_stream_end closures in _dispatch hardcode metadata dicts,
#      dropping channel-specific fields like message_thread_id.

id: nanobot-streaming-metadata
source: custom
repo: HKUDS/nanobot
commit_sha: "80403d352bc7725dca2bdda97605cee352b8f26d"
fix_commit_sha: "0d10c129e89f0ed0b7809622f21e4d5b2f8122ed"
task: |
  Fix a bug where streaming responses drop channel-specific metadata.

  When a message arrives from a channel (e.g. Telegram) with metadata like
  `{"message_thread_id": "42"}`, the streaming response messages lose that
  metadata. Only internal streaming fields are present; channel-specific fields
  like `message_thread_id` are gone. This breaks topic-thread routing in
  channels that rely on metadata pass-through.

  For example, a Telegram message with `message_thread_id` in its metadata
  triggers a streaming response, but the streamed chunks and the stream-end
  message no longer carry `message_thread_id`.

  Find and fix the root cause. Add a test case that verifies inbound message metadata (e.g. message_thread_id) is preserved in streaming responses.
verification: fixtures/nanobot-streaming-metadata/verify.sh
difficulty: medium
timeout_ms: 600000

context_tree_versions:
