# Eval case: Provider-executed tool error code lost in streaming
# Based on: https://github.com/vercel/ai/pull/13256
# Issue: https://github.com/vercel/ai/issues/12203
# Bug: Structured error data from provider-executed tools is lost through
#      toUIMessageStream. Error code falls back to 'unknown', Anthropic rejects.

id: vercel-ai-error-code
source: custom
repo: vercel/ai
commit_sha: "7362d1ecc26e334eb02c5289c1c314667b524eeb"
fix_commit_sha: "1fe058b76be1f472a44f21576aefd87ddb7ccbe8"
task: |
  Fix a bug where provider-executed tool errors cause Anthropic API 400 errors
  on the follow-up request.

  When a provider-executed tool (like `web_fetch`) returns a structured error
  (e.g. `{ type: 'web_fetch_tool_result_error', errorCode: 'url_not_accessible' }`),
  the error data is lost somewhere in the streaming pipeline. By the time the
  next request is sent to Anthropic, the error code has become `unknown`, and
  Anthropic rejects it with a 400 because `unknown` is not a valid error code.

  The structured error object should survive the streaming pipeline intact so
  that valid error codes are preserved. Additionally, when no error code is
  available at all, the fallback should be a code that Anthropic actually accepts.

  Find and fix the root cause(s). Add a test that verifies structured error data from provider-executed tools is preserved through the streaming pipeline.
verification: fixtures/vercel-ai-error-code/verify.sh
