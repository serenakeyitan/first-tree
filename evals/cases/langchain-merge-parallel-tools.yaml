# Eval case: merge_lists incorrectly merges parallel tool calls
# Based on: https://github.com/langchain-ai/langchain/pull/35281
# Issue: https://github.com/langchain-ai/langchain/issues/34807
# Bug: merge_lists only checks index field, not id, so parallel tool calls
#      with same index but different IDs get merged (names/IDs concatenated).

id: langchain-merge-parallel-tools
source: custom
repo: langchain-ai/langchain
commit_sha: "3686bcbd966ff1ef13e5fdbde28aa0e630ddd5c4"
task: |
  Fix a bug where parallel tool calls get incorrectly merged during streaming.

  When LLMs (e.g. Claude via Bedrock) stream parallel tool calls, separate tool
  calls are incorrectly merged into one — their names and IDs get concatenated
  into a single tool call. This produces corrupted tool call objects that
  downstream code cannot parse.

  For example, two parallel tool calls with different IDs ("call_1" and
  "call_2") end up as a single tool call with a concatenated name like
  "get_weatherget_stock_price" and a concatenated ID "call_1call_2".

  Normal sequential streaming (where continuation chunks extend an existing
  tool call) should still work correctly.

  Find and fix the root cause. Add a test that verifies parallel tool calls with different indices are not incorrectly merged.
setup: |
  cd libs/core
  uv venv .venv --quiet
  uv pip install -e ".[test]" --quiet --python .venv/bin/python
verification: fixtures/langchain-merge-parallel-tools/verify.sh
difficulty: medium
timeout_ms: 600000

context_tree_versions:
  - label: cli-v0.0.2
    tree_sha: "f78c7a9841343ff041bf7372e7e3367b7b65b75d"
