# Eval case: ExecTool regex bug — Windows drive-root paths bypass workspace guard.
# Based on: https://github.com/HKUDS/nanobot/pull/2683
# Issue: https://github.com/HKUDS/nanobot/issues/2671

id: nanobot-exectool-regex
source: custom
repo: HKUDS/nanobot
commit_sha: "ddc9fc4fd286025aebaab5fb3f2f032a18ed2478"
fix_commit_sha: "485c75e065808aa3d27bb35805d782d3365a5794"
task: |
  Fix a security bug in the shell tool's workspace safety guard.

  When `restrict_to_workspace=True`, the tool is supposed to block commands that
  reference paths outside the workspace. However, bare Windows drive-root paths
  like `E:\` are not detected. A command like `dir E:\` bypasses the workspace
  guard entirely, allowing access to files outside the workspace.

  Find and fix the root cause. Add a test case to the existing test file that verifies the guard blocks bare drive-root paths like `E:\`.
verification: fixtures/nanobot-exectool-regex/verify.sh
