# Eval case: ImportString masks internal import failures
# Based on: https://github.com/pydantic/pydantic/pull/12740
# Issue: https://github.com/pydantic/pydantic/issues/12715
# Bug: When a module has a broken internal import, pydantic reports
#      "No module named X" instead of the real ModuleNotFoundError.

id: pydantic-importstring-error
source: custom
repo: pydantic/pydantic
commit_sha: "c42224acb31dd9f374124a74809332246e595194"
task: |
  Fix a bug in pydantic's `ImportString` type.

  When a module exists but has a broken internal import (e.g. it does
  `import definitely_missing_dep` at the top), using `ImportString` to validate
  that module name reports "No module named X" instead of surfacing the real
  `ModuleNotFoundError` about the missing dependency. The real error is swallowed,
  making it very hard to debug.

  For example:
    - Module `mymod` exists but does `import definitely_missing_dep`
    - Validating `ImportString` with "mymod" should tell the user about
      `definitely_missing_dep`, not claim `mymod` doesn't exist

  There is also a related issue: when an import path uses explicit colon syntax
  (e.g. "mod:attr"), the fallback logic incorrectly tries to split on dots
  and produces confusing errors.

  Find and fix the root cause. Add a test case that verifies broken internal imports surface the real error instead of 'No module named X'.
setup: |
  uv venv .venv --quiet
  uv sync --frozen --all-groups --all-packages --all-extras --quiet --python .venv/bin/python 2>/dev/null || uv pip install -e ".[testing]" --quiet --python .venv/bin/python
verification: fixtures/pydantic-importstring-error/verify.sh
difficulty: medium
timeout_ms: 600000

context_tree_versions:
  - label: cli-v0.0.2
    tree_sha: "b4f9694f69d10a15a4e04f7097796a0a4ed6c80d"
