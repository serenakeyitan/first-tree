interface:
  display_name: "First Tree"
  short_description: "Maintain the First Tree skill and thin first-tree CLI"
  default_prompt: "Use $first-tree to maintain the canonical first-tree skill, its thin first-tree CLI, or its build, packaging, test, eval, and CI wiring. When a source/workspace repo installs first-tree, read references/source-workspace-installation.md first, keep that repo limited to local skill integration plus the managed FIRST-TREE-SOURCE-INTEGRATION section, keep local checkout state only in ignored .first-tree/local-tree.json, and keep all NODE.md/tree content only in a dedicated sibling *-tree repo. Reuse older bound *-context repos instead of renaming them. Never choose first-tree init --here in the source/workspace repo unless the user explicitly wants that repo itself to become the tree. After the initial scaffold is in place, use progress.md as the onboarding source of truth: report setup/integration progress separately from tree-content baseline coverage, ask whether to continue deeper tree population, and if the user confirms, use wave-based parallel sub-tasks or subagents by top-level domain while keeping root NODE.md, cross-domain soft_links, and final verify in the main agent."
