interface:
  display_name: "First Tree"
  short_description: "Maintain the First Tree skill and thin first-tree CLI"
  default_prompt: "Use $first-tree to maintain the canonical first-tree skill, its thin first-tree CLI, or its build, packaging, test, eval, and CI wiring. Always start repo/workspace onboarding by running `first-tree tree inspect --json`, then ask whether the user already has a Context Tree. If they do, prefer `first-tree tree bind`; if they do not, use `first-tree tree init`. When the current root is a workspace, keep the workspace root limited to local skill integration plus binding metadata, keep tree content only in the shared tree repo, and use `first-tree tree workspace sync` so child repos bind to that same tree. Keep binding metadata in `.first-tree/source.json` and tree-side binding metadata in `.first-tree/tree.json` plus `.first-tree/bindings/`. Treat `source-repos.md` in the tree root as the quick repo index for humans and agents, but keep `.first-tree/bindings/` as the canonical machine-readable source of truth. After the initial scaffold is in place, use progress.md as the onboarding source of truth: report setup/integration progress separately from tree-content baseline coverage, ask whether to continue deeper tree population, and if the user confirms, use wave-based parallel sub-tasks or subagents by top-level domain while keeping root NODE.md, cross-domain soft_links, and final verify in the main agent."
